<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Donation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="thank-you-card">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="success-icon">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>

        <h1>Thank You for Donating!</h1>
        <p class="message">Your contribution helps reduce food waste and supports our community.</p>
        
        <div class="actions">
            <a href="{{ url_for('index') }}" class="btn-primary">Return to Home</a>
        </div>
    </main>
</body>
</html>
    <style>
        /* Modern Reset & CSS Variables */
:root {
    --primary-color: #2e7d32;     /* Food-waste/Eco green */
    --primary-hover: #1b5e20;     /* Darker green for hover states */
    --bg-slate: #f8fafc;          /* Soft, modern background light gray */
    --text-main: #1e293b;         /* Slate dark text for high readability */
    --text-muted: #64748b;        /* Muted slate text for description */
    --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-slate);
    color: var(--text-main);
    margin: 0;
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
}

/* Card Container */
.thank-you-card {
    background: #ffffff;
    max-width: 480px;
    width: 100%;
    padding: 48px 32px;
    border-radius: 16px;
    box-shadow: var(--shadow-md);
    text-align: center;
    animation: fadeInUp 0.5s ease-out;
}

/* Icon Styling */
.icon-container {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
}

.success-icon {
    color: var(--primary-color);
    animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Typography */
h1 {
    font-size: 2rem;
    font-weight: 700;
    margin: 0 0 16px 0;
    letter-spacing: -0.025em;
}

.message {
    font-size: 1.1rem;
    line-height: 1.6;
    color: var(--text-muted);
    margin: 0 0 32px 0;
}

/* Button Styling */
.btn-primary {
    display: inline-block;
    background-color: var(--primary-color);
    color: #ffffff;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    padding: 14px 28px;
    border-radius: 8px;
    transition: background-color 0.2s ease, transform 0.1s ease;
}

.btn-primary:hover {
    background-color: var(--primary-hover);
}

.btn-primary:active {
    transform: scale(0.98);
}

/* Simple Entrance Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes scaleIn {
    from {
        transform: scale(0);
    }
    to {
        transform: scale(1);
    }
}
    </style>
</body>
</html>
