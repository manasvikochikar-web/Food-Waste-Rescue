<section id="donate">
    <h2>Support Our Mission</h2>
    <p>Your contribution helps us keep these projects free and open-source.</p>
    
    <form id="donationForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required> <br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required> <br>
        <label for="amount">Amount (INR):</label>
        <input type="number" id="amount" name="amount" placeholder="500" required> <br>
        
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="john.doe@example.com" required> <br>
        
        <button type="submit" class="btn-primary">Donate Now</button>
    </form>
</section>
